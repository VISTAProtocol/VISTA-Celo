[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc_version = "0.8.24"
optimizer = true
optimizer_runs = 200
remappings = [
    "@openzeppelin/=lib/openzeppelin-contracts/",
    "forge-std/=lib/forge-std/src/"
]
fs_permissions = [{ access = "read-write", path = "./" }]
metadata_hash = "none"
use_literal_content = true

[rpc_endpoints]
celo_sepolia = "https://forno.celo-sepolia.celo-testnet.org"

[etherscan]
monad_testnet = { key = "placeholder" }
celo_sepolia = { key = "placeholder", chain = 11142220 }

#  https://forno.celo-sepolia.celo-testnet.org : 
# 23950543
#   ORACLE_PRIVATE_KEY  — private key of wallet set as authorizedOracle in VistaStream
